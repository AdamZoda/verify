<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vérification</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(270deg, #0f0c29, #302b63, #24243e, #1a1a6e, #2980b9, #6dd5fa, #2980b9, #1a1a6e);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .captcha-box {
      background: #fff;
      border: 1px solid #d3d3d3;
      border-radius: 4px;
      width: 300px;
      padding: 16px 16px 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .left-side {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .checkbox-wrapper {
      position: relative;
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .checkbox-wrapper input[type="checkbox"] {
      opacity: 0;
      width: 24px;
      height: 24px;
      position: absolute;
      top: 0;
      left: 0;
      cursor: pointer;
      z-index: 2;
    }

    .custom-checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #c8c8c8;
      border-radius: 2px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
      position: relative;
    }

    .checkbox-wrapper input[type="checkbox"]:checked + .custom-checkbox::after {
      content: '';
      display: block;
      width: 6px;
      height: 11px;
      border: 2.5px solid #4a90d9;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -2px);
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid #e0e0e0;
      border-top: 3px solid #4a90d9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      top: 2px;
      left: 2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .label-text {
      font-size: 14px;
      color: #333;
      user-select: none;
      cursor: default;
    }

    .right-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .recaptcha-logo {
      width: 32px;
      height: 32px;
    }

    .brand-name {
      font-size: 8px;
      color: #555;
      letter-spacing: 0.3px;
    }

    .brand-sub {
      font-size: 7px;
      color: #888;
    }

    .captcha-box.checking .spinner {
      display: block;
    }
    .captcha-box.checking .custom-checkbox {
      border-color: transparent;
    }

    .verified-text {
      display: none;
      color: #4caf50;
      font-size: 13px;
      font-weight: 500;
    }

    .captcha-box.verified .label-text {
      display: none;
    }

    .captcha-box.verified .verified-text {
      display: inline;
    }
  </style>
</head>
<body>

  <div class="captcha-box" id="captchaBox">
    <div class="left-side">
      <div class="checkbox-wrapper" id="checkboxWrapper">
        <input type="checkbox" id="captchaCheck" autocomplete="off" />
        <div class="custom-checkbox" id="customCheckbox"></div>
        <div class="spinner" id="spinner"></div>
      </div>
      <span class="label-text" id="labelText">Je ne suis pas un robot</span>
      <span class="verified-text" id="verifiedText">✔ Vérifié</span>
    </div>

    <div class="right-side">
      <svg class="recaptcha-logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" fill="#4a90d9" opacity="0.15"/>
        <path d="M32 10 C20 10, 10 20, 10 32 C10 44, 20 54, 32 54 C44 54, 54 44, 54 32 C54 20, 44 10, 32 10Z"
              stroke="#4a90d9" stroke-width="3" fill="none"/>
        <path d="M22 32 L28 38 L42 24" stroke="#4a90d9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">reCAPTCHA</span>
      <span class="brand-sub">Confidentialité · Conditions</span>
    </div>
  </div>

  <script>
    const box = document.getElementById('captchaBox');
    const check = document.getElementById('captchaCheck');
    const spinner = document.getElementById('spinner');

    check.addEventListener('change', function () {
      if (this.checked) {
        box.classList.add('checking');
        spinner.style.display = 'block';
        check.disabled = true;

        setTimeout(() => {
          spinner.style.display = 'none';
          box.classList.remove('checking');
          box.classList.add('verified');
        }, 1200);
      } else {
        box.classList.remove('verified');
      }
    });
  </script>
</body>
</html>
